name: Wiki Lint

permissions:
  contents: read

on:
  push:
    branches: [master, main]
    paths:
      - 'wiki/**'
      - 'index.md'
      - 'scripts/**'
      - 'hooks/**'
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Check index is up to date
        run: uv run python scripts/rebuild_index.py --check

      - name: Run structural lint
        run: uv run python scripts/lint.py --structural-only

      - name: Ruff check
        run: uv run ruff check scripts/ hooks/

      - name: Ruff format check
        run: uv run ruff format --check scripts/ hooks/

      - name: Syntax check all Python files
        run: |
          uv run python -c "
          import ast, sys
          files = [
              'scripts/flush.py', 'scripts/compile.py', 'scripts/query.py',
              'scripts/lint.py', 'scripts/utils.py', 'scripts/config.py',
              'scripts/rebuild_index.py', 'scripts/seed.py', 'scripts/wiki_cli.py',
              'hooks/session-start.py', 'hooks/session-end.py',
              'hooks/pre-compact.py', 'hooks/hook_utils.py',
              'hooks/user-prompt-wiki.py', 'hooks/post-tool-capture.py',
              'hooks/stop-wiki-reminder.py',
          ]
          errors = 0
          for f in files:
              try:
                  ast.parse(open(f).read())
              except SyntaxError as e:
                  print(f'FAIL {f}: {e}')
                  errors += 1
          if errors:
              sys.exit(1)
          print(f'All {len(files)} files OK')
          "
