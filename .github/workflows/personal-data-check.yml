name: Personal Data Check

permissions:
  contents: read

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check for personal data in tracked files
        run: |
          # Scan all tracked files except this workflow itself
          echo "Scanning all tracked files for personal data patterns..."
          FOUND=$(git ls-files -z | grep -zv 'personal-data-check.yml' | xargs -0 grep -lP '/mnt/[a-z]/[A-Z]|[A-Z]:/[A-Z]|C:\\\\Users' 2>/dev/null || true)

          if [ -n "$FOUND" ]; then
            echo "::error::Personal data found in the following files:"
            echo "$FOUND"
            echo ""
            echo "Details:"
            printf '%s\n' "$FOUND" | xargs -d '\n' grep -nP '/mnt/[a-z]/[A-Z]|[A-Z]:/[A-Z]|C:\\\\Users' 2>/dev/null || true
            exit 1
          fi

          echo "All clear — no personal data found."
