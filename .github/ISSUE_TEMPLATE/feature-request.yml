name: Feature request
description: Suggest an improvement to the wiki workflow, hooks, CLI, or docs.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Similar tools, workflows, screenshots, or links that help explain the request.
    validations:
      required: false
